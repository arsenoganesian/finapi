default: &default
  adapter: postgresql
  encoding: unicode
  max_connections: <%= ENV.fetch("RAILS_MAX_THREADS") { 3 } %>


development:
  <<: *default
  database: finapi_development

test:
  <<: *default
  database: finapi_test

production:
  <<: *default
  database: finapi_production
  username: finapi
  password: <%= ENV["FINAPI_DATABASE_PASSWORD"] %>
